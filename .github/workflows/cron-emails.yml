name: Emails automatiques CRM
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'
jobs:
  envoyer-emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: node lib/agents/agent-email.js
        env:
          SUPABASE_URL: https://lvyssjfowjxzbkvnhisk.supabase.co
          NEXT_PUBLIC_SUPABASE_URL: https://lvyssjfowjxzbkvnhisk.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_NOM: Farshad Sahraei
          AGENT_EMAIL: farshad.sahraei@megagence.com
          AGENT_TELEPHONE: "07 60 58 56 93"
          AGENT_AGENCE: Megagence Normandie
