name: Emails automatiques CRM
on:
  workflow_dispatch:
jobs:
  envoyer-emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verifier secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "URL definie: ${{ secrets.SUPABASE_URL != '' }}"
          echo "KEY definie: ${{ secrets.SUPABASE_SERVICE_KEY != '' }}"
      - name: Installer
        run: npm install
      - name: Envoyer emails
        run: node lib/agents/agent-email.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_NOM: Farshad Sahraei
          AGENT_EMAIL: farshad.sahraei@megagence.com
          AGENT_TELEPHONE: "07 60 58 56 93"
          AGENT_AGENCE: Megagence Normandie
