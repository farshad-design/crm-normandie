# .github/workflows/cron-scoring.yml
# Recalcule le score de priorité de tous les vendeurs chaque lundi

name: Scoring vendeurs CRM

on:
  schedule:
    - cron: '0 7 * * 1'   # Chaque lundi à 7h00 (UTC)
  workflow_dispatch:

jobs:
  scorer-vendeurs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm install

      - name: Rescorer tous les vendeurs
        env:
          NEXT_PUBLIC_SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
        run: node lib/agents/agent-scoring.js

      - name: Résultat
        run: echo "Scoring mis à jour !"
